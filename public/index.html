<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IEG LMS — Learning Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#2563eb;--primary-d:#1d4ed8;--primary-l:#eff6ff;
  --green:#16a34a;--green-l:#dcfce7;--red:#dc2626;--red-l:#fee2e2;
  --yellow:#d97706;--yellow-l:#fef3c7;--purple:#7c3aed;--purple-l:#ede9fe;
  --teal:#0d9488;--teal-l:#ccfbf1;--orange:#ea580c;--orange-l:#ffedd5;
  --sidebar:258px;--radius:10px;--radius-sm:7px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 8px rgba(0,0,0,.07);--shadow-lg:0 10px 20px rgba(0,0,0,.1);
  --bg:#f1f5f9;--surface:#fff;--border:#e2e8f0;
  --text:#0f172a;--muted:#64748b;--light:#94a3b8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px}
/* AUTH */
.auth-wrap{min-height:100vh;display:flex;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 55%,#2563eb 100%)}
.auth-left{flex:1;display:flex;flex-direction:column;justify-content:center;padding:64px;color:#fff;position:relative}
.auth-left::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 20% 50%,rgba(255,255,255,.04) 0,transparent 60%)}
@media(max-width:768px){.auth-left{display:none}}
.brand-icon{width:52px;height:52px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;backdrop-filter:blur(8px);margin-bottom:16px}
.auth-left h1{font-size:48px;font-weight:800;line-height:1.1;letter-spacing:-2px;margin-bottom:16px}
.auth-left p{font-size:16px;opacity:.65;line-height:1.7;max-width:380px;margin-bottom:44px}
.auth-feat{display:flex;align-items:center;gap:12px;margin-bottom:14px;opacity:.8}
.feat-icon{width:36px;height:36px;background:rgba(255,255,255,.1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.auth-right{width:480px;display:flex;align-items:center;justify-content:center;padding:32px;background:rgba(255,255,255,.04);backdrop-filter:blur(20px);border-left:1px solid rgba(255,255,255,.07)}
.auth-card{background:#fff;border-radius:18px;padding:38px;width:100%;box-shadow:0 30px 60px rgba(0,0,0,.3)}
.auth-tabs{display:flex;gap:6px;background:var(--bg);padding:4px;border-radius:8px;margin-bottom:24px}
.auth-tab{flex:1;padding:9px;border:none;border-radius:6px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:var(--muted);background:transparent;transition:all .15s}
.auth-tab.active{background:#fff;color:var(--primary);box-shadow:var(--shadow)}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border:none;border-radius:var(--radius-sm);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;text-decoration:none;white-space:nowrap}
.btn:disabled{opacity:.55;cursor:not-allowed}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover:not(:disabled){background:var(--primary-d);box-shadow:0 4px 12px rgba(37,99,235,.35)}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover:not(:disabled){background:#b91c1c}
.btn-success{background:var(--green);color:#fff}.btn-success:hover:not(:disabled){background:#15803d}
.btn-warning{background:var(--yellow);color:#fff}
.btn-purple{background:var(--purple);color:#fff}
.btn-teal{background:var(--teal);color:#fff}
.btn-outline{background:transparent;color:var(--primary);border:1.5px solid var(--primary)}.btn-outline:hover:not(:disabled){background:var(--primary-l)}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border)}.btn-ghost:hover:not(:disabled){background:var(--bg);color:var(--text)}
.btn-sm{padding:6px 12px;font-size:12px}.btn-lg{padding:12px 24px;font-size:15px}.btn-block{width:100%}
/* LAYOUT */
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar);background:#0f172a;position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:200;overflow:hidden;transition:transform .25s}
.sb-head{padding:18px 14px 12px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-brand{display:flex;align-items:center;gap:10px}
.sb-brand-icon{width:36px;height:36px;background:var(--primary);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.sb-brand-name{font-size:16px;font-weight:800;color:#fff;letter-spacing:-.4px}
.sb-brand-sub{font-size:10px;color:rgba(255,255,255,.35)}
.sb-user{padding:13px 14px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;background:var(--primary)}
.av-sm{width:28px;height:28px;font-size:11px;border-radius:6px}
.av-lg{width:52px;height:52px;font-size:18px;border-radius:12px}
.sb-nav{flex:1;overflow-y:auto;padding:10px 8px}
.nav-section{font-size:10px;font-weight:700;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.8px;padding:10px 8px 4px;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:7px;cursor:pointer;color:rgba(255,255,255,.55);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:1px;border:none;background:transparent;width:100%;text-align:left}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.4)}
.nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sb-foot{padding:10px 8px;border-top:1px solid rgba(255,255,255,.07)}
/* MAIN */
.main{margin-left:var(--sidebar);display:flex;flex-direction:column;min-height:100vh}
.header{height:60px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:100}
.header-title{font-size:17px;font-weight:700;letter-spacing:-.3px;flex:1}
.content{flex:1;padding:24px}
/* CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);display:flex;align-items:center;gap:16px;transition:box-shadow .18s}
.stat-card:hover{box-shadow:var(--shadow-md)}
.stat-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.stat-val{font-size:28px;font-weight:800;letter-spacing:-1px}
.stat-label{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:4px}
.stat-sub{font-size:11px;color:var(--muted);margin-top:3px}
.card{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px}
.card-title{font-size:15px;font-weight:700;letter-spacing:-.3px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
@media(max-width:900px){.grid-2,.grid-3{grid-template-columns:1fr}}
/* TABLES */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:var(--bg)}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;border-bottom:1px solid var(--border)}
td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbfc}
.td-actions{display:flex;gap:6px;flex-wrap:wrap}
/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700}
.badge-green{background:var(--green-l);color:#15803d}
.badge-red{background:var(--red-l);color:var(--red)}
.badge-yellow{background:var(--yellow-l);color:var(--yellow)}
.badge-blue{background:var(--primary-l);color:var(--primary)}
.badge-purple{background:var(--purple-l);color:var(--purple)}
.badge-teal{background:var(--teal-l);color:var(--teal)}
.badge-orange{background:var(--orange-l);color:var(--orange)}
.badge-gray{background:#f1f5f9;color:var(--muted)}
/* FORMS */
.form-group{margin-bottom:15px}
.form-group label{display:block;font-size:12px;font-weight:600;margin-bottom:5px;color:var(--text)}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:13px;outline:none;transition:border-color .15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.err-box{background:var(--red-l);border:1px solid #fca5a5;border-radius:var(--radius-sm);padding:10px 13px;font-size:13px;color:var(--red);margin-bottom:14px}
.hint-box{background:var(--primary-l);border:1px solid #bfdbfe;border-radius:var(--radius-sm);padding:10px 13px;font-size:12px;color:#1e40af;margin-bottom:16px;line-height:1.6}
/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;backdrop-filter:blur(3px)}
.modal{background:#fff;border-radius:16px;padding:28px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 25px 50px rgba(0,0,0,.25)}
.modal-lg{max-width:780px}
.modal-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px}
.modal-title{font-size:18px;font-weight:800;letter-spacing:-.4px}
.modal-sub{font-size:13px;color:var(--muted);margin-top:3px}
.modal-close{width:32px;height:32px;border-radius:8px;border:none;background:var(--bg);color:var(--muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.modal-close:hover{background:var(--red-l);color:var(--red)}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:22px;padding-top:16px;border-top:1px solid var(--border)}
/* MISC */
.progress-bar{height:6px;background:#e2e8f0;border-radius:99px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;background:var(--green);transition:width .3s}
.progress-fill.warn{background:var(--yellow)}.progress-fill.danger{background:var(--red)}
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.4}
.empty-title{font-size:16px;font-weight:600;margin-bottom:6px}
.loading{text-align:center;padding:40px;color:var(--muted)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.section-title{font-size:18px;font-weight:800;letter-spacing:-.4px;margin-bottom:16px}
.divider{height:1px;background:var(--border);margin:18px 0}
.text-muted{color:var(--muted)}.text-sm{font-size:12px}.fw-600{font-weight:600}
.info-row{display:flex;padding:11px 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-label{width:160px;font-size:12px;font-weight:600;color:var(--muted);flex-shrink:0}
.info-value{font-size:13px;font-weight:500}
/* COURSE CARDS */
.course-card{background:#fff;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);border-left:4px solid var(--primary);transition:box-shadow .18s,transform .18s;cursor:pointer}
.course-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.course-card-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:10px}
.course-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
/* TOAST */
.toast-wrap{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:9999;max-width:340px}
.toast{background:#1e293b;color:#fff;padding:12px 16px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);animation:slideIn .2s ease;display:flex;align-items:center;gap:10px}
.toast.success{background:#15803d}.toast.error{background:var(--red)}.toast.warning{background:var(--yellow)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
/* ROLE COLORS */
.role-admin{background:#fef3c7;color:#92400e}
.role-teacher{background:var(--purple-l);color:var(--purple)}
.role-student{background:var(--primary-l);color:var(--primary)}
/* Search bar */
.search-wrap{position:relative}
.search-wrap input{padding-left:36px;width:100%;padding:9px 12px 9px 36px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--primary)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--light);pointer-events:none}
/* Grade colors */
.grade-A{color:#15803d;font-weight:700}.grade-B{color:#1d4ed8;font-weight:700}
.grade-C{color:#d97706;font-weight:700}.grade-D{color:#ea580c;font-weight:700}.grade-F{color:var(--red);font-weight:700}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}
  .main{margin-left:0}.content{padding:16px}.stats-grid{grid-template-columns:1fr 1fr}
  .form-row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="app"></div>

<script>
'use strict';
// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
const S = {
  user: null,
  token: localStorage.getItem('ieg_token'),
  page: 'dashboard',
  data: {},
  modal: null,
  loading: false,
  authRole: 'admin',
  authMode: 'login'
};

// ═══════════════════════════════════════════════
//  API HELPERS
// ═══════════════════════════════════════════════
const BASE = '/api';
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (S.token) opts.headers['Authorization'] = `Bearer ${S.token}`;
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(BASE + path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.message || `HTTP ${res.status}`);
  return data;
}
const GET  = p     => api('GET',    p);
const POST = (p,b) => api('POST',   p, b);
const PUT  = (p,b) => api('PUT',    p, b);
const DEL  = p     => api('DELETE', p);

// ═══════════════════════════════════════════════
//  RENDER ENGINE
// ═══════════════════════════════════════════════
function render() { document.getElementById('app').innerHTML = buildApp(); }
function buildApp() {
  if (!S.user) return buildAuth();
  return `<div class="app">${buildSidebar()}<div class="main">${buildHeader()}<div class="content" id="pc">${S.loading ? buildLoading() : buildPage()}</div></div></div><div id="modal-root"></div><div class="toast-wrap" id="tw"></div>`;
}
function buildLoading() { return `<div class="loading"><div class="spinner"></div><div>Loading...</div></div>`; }
function rp() {
  const el = document.getElementById('pc');
  if (el) el.innerHTML = S.loading ? buildLoading() : buildPage();
}

// ═══════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════
function buildAuth() {
  const role = S.authRole;
  const hints = {
    admin:   'admin@iets.edu &nbsp;/&nbsp; Admin@123',
    teacher: 'teacher1@iets.edu &nbsp;/&nbsp; Teacher@123',
    student: '(any seeded email) &nbsp;/&nbsp; Student@123'
  };
  return `
  <div class="auth-wrap">
    <div class="auth-left">
      <div class="brand-icon">🎓</div>
      <h1>IEG<br>Learning<br>Management</h1>
      <p>Complete LMS with Admin, Teacher & Student portals — database connected, production ready.</p>
      <div class="auth-feat"><div class="feat-icon">👤</div>Admin assigns courses & teachers</div>
      <div class="auth-feat"><div class="feat-icon">👩‍🏫</div>Teachers manage assignments & grades</div>
      <div class="auth-feat"><div class="feat-icon">🎓</div>Students view courses & results directly</div>
      <div class="auth-feat"><div class="feat-icon">🗄️</div>Real MySQL database — no mock data</div>
    </div>
    <div class="auth-right">
      <div class="auth-card">
        <h2 style="font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px">Welcome Back</h2>
        <p style="color:var(--muted);font-size:13px;margin-bottom:20px">Sign in to your portal</p>
        <div class="auth-tabs">
          <button class="auth-tab ${role==='admin'?'active':''}" onclick="S.authRole='admin';render()">👤 Admin</button>
          <button class="auth-tab ${role==='teacher'?'active':''}" onclick="S.authRole='teacher';render()">👩‍🏫 Teacher</button>
          <button class="auth-tab ${role==='student'?'active':''}" onclick="S.authRole='student';render()">🎓 Student</button>
        </div>
        <div class="hint-box">${hints[role]}</div>
        <div id="auth-err"></div>
        <div class="form-group"><label>Email</label><input id="le" type="email" value="${role==='admin'?'admin@iets.edu':role==='teacher'?'teacher1@iets.edu':''}"></div>
        <div class="form-group"><label>Password</label><input id="lp" type="password" value="${role==='admin'?'Admin@123':role==='teacher'?'Teacher@123':'Student@123'}"></div>
        <button class="btn btn-primary btn-block btn-lg" onclick="doLogin()" style="margin-top:6px">Sign In →</button>
        ${role==='student' ? `<div style="text-align:center;margin-top:14px;font-size:13px;color:var(--muted)">New? <a href="#" onclick="showRegister()" style="color:var(--primary);font-weight:600">Create Account</a></div>` : ''}
      </div>
    </div>
  </div>`;
}

async function doLogin() {
  const email = document.getElementById('le')?.value?.trim();
  const pass  = document.getElementById('lp')?.value;
  const err   = document.getElementById('auth-err');
  if (!email || !pass) { err.innerHTML = `<div class="err-box">Please enter email and password.</div>`; return; }
  try {
    const res = await POST('/auth/login', { email, password: pass });
    S.token = res.token; S.user = res.user;
    localStorage.setItem('ieg_token', res.token);
    await loadPageData('dashboard');
    render();
  } catch (e) { if (err) err.innerHTML = `<div class="err-box">${e.message}</div>`; }
}

function showRegister() {
  openModal('register');
}

function logout() {
  S.user = null; S.token = null; S.data = {}; S.page = 'dashboard';
  localStorage.removeItem('ieg_token');
  render();
}

// ═══════════════════════════════════════════════
//  SIDEBAR
// ═══════════════════════════════════════════════
function buildSidebar() {
  const role = S.user.role;
  const init = S.user.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  const roleBg = role==='admin'?'#f97316':role==='teacher'?'#7c3aed':'#2563eb';

  const adminNav = [
    {sec:'Main'},{id:'dashboard',icon:'🏠',label:'Dashboard'},
    {sec:'Management'},{id:'students',icon:'👥',label:'Students'},{id:'teachers',icon:'👩‍🏫',label:'Teachers'},{id:'courses',icon:'📚',label:'Courses'},
    {sec:'Account'},{id:'profile',icon:'⚙️',label:'Profile'},
  ];
  const teacherNav = [
    {sec:'Main'},{id:'dashboard',icon:'🏠',label:'Dashboard'},
    {sec:'Teaching'},{id:'courses',icon:'📚',label:'My Courses'},{id:'assignments',icon:'📝',label:'Assignments'},{id:'grades',icon:'📊',label:'Grades'},
    {sec:'Account'},{id:'profile',icon:'⚙️',label:'Profile'},
  ];
  const studentNav = [
    {sec:'Main'},{id:'dashboard',icon:'🏠',label:'Dashboard'},
    {sec:'Learning'},{id:'courses',icon:'📚',label:'My Courses'},{id:'assignments',icon:'📝',label:'Assignments'},{id:'grades',icon:'📊',label:'My Grades'},
    {sec:'Account'},{id:'profile',icon:'⚙️',label:'Profile'},
  ];
  const nav = role==='admin' ? adminNav : role==='teacher' ? teacherNav : studentNav;

  return `
  <div class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="sb-brand">
        <div class="sb-brand-icon">🎓</div>
        <div><div class="sb-brand-name">IEG LMS</div><div class="sb-brand-sub">${role==='admin'?'Admin Portal':role==='teacher'?'Teacher Portal':'Student Portal'}</div></div>
      </div>
    </div>
    <div class="sb-user">
      <div class="avatar" style="background:${roleBg}">${init}</div>
      <div style="min-width:0">

}

// ═══════════════════════════════════════════════
//  HEADER
// ═══════════════════════════════════════════════
const PAGE_TITLES = { dashboard:'Dashboard', students:'Students', teachers:'Teachers', courses:'Courses', assignments:'Assignments', grades:'Grades', profile:'Profile', course_detail:'Course Details' };
function buildHeader() {
  const role = S.user.role;
  const roleClass = `role-${role}`;
  return `
  <div class="header">
    <div class="header-title">${PAGE_TITLES[S.page]||'IEG LMS'}</div>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="badge ${roleClass}" style="font-size:12px;padding:4px 10px">${role==='admin'?'👤 Admin':role==='teacher'?'👩‍🏫 Teacher':'🎓 Student'}</span>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════
async function navigate(page, extra) {
  S.page = page;
  S.data = {};
  if (extra) S.data.extra = extra;
  document.getElementById('sidebar')?.classList.remove('open');
  S.loading = true; rp();
  await loadPageData(page);
  S.loading = false; rp();
}

async function loadPageData(page) {
  try {
    const role = S.user.role;
    if (page === 'dashboard') {
      if (role === 'admin') S.data.dash = (await GET('/admin/stats')).data;
      else if (role === 'teacher') S.data.dash = (await GET('/teacher/dashboard')).data;
      else S.data.dash = (await GET('/student/dashboard')).data;
    } else if (page === 'students' && role === 'admin') {
      S.data.students = (await GET('/admin/students?limit=200')).data;
    } else if (page === 'teachers' && role === 'admin') {
      S.data.teachers = (await GET('/admin/teachers')).data;
      S.data.courses   = (await GET('/admin/courses')).data;
    } else if (page === 'courses') {
      if (role === 'admin') S.data.courses = (await GET('/admin/courses')).data;
      else if (role === 'teacher') S.data.courses = (await GET('/teacher/courses')).data;
      else S.data.courses = (await GET('/student/courses')).data;
    } else if (page === 'assignments') {
      if (role === 'teacher') {
        S.data.assignments = (await GET('/teacher/assignments')).data;
        S.data.courses     = (await GET('/teacher/courses')).data;
      } else {
        S.data.assignments = (await GET('/student/assignments')).data;
      }
    } else if (page === 'grades') {
      if (role === 'teacher') {
        S.data.courses = (await GET('/teacher/courses')).data;
      } else {
        const r = await GET('/student/grades');
        S.data.grades = r.data; S.data.summary = r.summary; S.data.cgpa = r.cgpa;
      }
    } else if (page === 'course_detail') {
      const id = S.data.extra?.id;
      if (id) S.data.course_detail = (await GET(`/student/courses/${id}`)).data;
    } else if (page === 'profile') {
      S.data.profile = (await GET('/auth/me')).user;
    }
  } catch (e) { toast('Failed to load: ' + e.message, 'error'); }
}

// ═══════════════════════════════════════════════
//  PAGE ROUTER
// ═══════════════════════════════════════════════
function buildPage() {
  const role = S.user.role;
  switch (S.page) {
    case 'dashboard':     return role==='admin' ? buildAdminDash() : role==='teacher' ? buildTeacherDash() : buildStudentDash();
    case 'students':      return role==='admin' ? buildStudentsPage() : buildAccessDenied();
    case 'teachers':      return role==='admin' ? buildTeachersPage() : buildAccessDenied();
    case 'courses':       return role==='admin' ? buildAdminCourses() : role==='teacher' ? buildTeacherCourses() : buildStudentCourses();
    case 'assignments':   return role==='teacher' ? buildTeacherAssignments() : buildStudentAssignments();
    case 'grades':        return role==='teacher' ? buildTeacherGrades() : buildStudentGrades();
    case 'course_detail': return buildCourseDetail();
    case 'profile':       return buildProfile();
    default: return `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">Page not found</div></div>`;
  }
}
function buildAccessDenied() {
  return `<div class="empty"><div class="empty-icon">🔒</div><div class="empty-title">Access Denied</div><div class="text-muted">You do not have permission to view this page.</div></div>`;
}
</script>

          <span class="text-sm text-muted">Enrollment</span>
          <span class="text-sm fw-600">${c.enrolled_count||c.current_enrollment||0}/${c.max_students||60}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,Math.round(((c.enrolled_count||c.current_enrollment||0)/(c.max_students||60))*100))}%"></div></div>
      </div>
      <div style="display:flex;gap:6px;margin-top:12px">
        <button class="btn btn-ghost btn-sm" onclick="openModal('edit-course',${JSON.stringify(c).replace(/"/g,'&quot;')})">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="archiveCourse(${c.id})">Archive</button>
      </div>
    </div>`).join('')}
  </div>`;
}

async function archiveCourse(id) {
  if (!confirm('Archive this course?')) return;
  try { await DEL(`/admin/courses/${id}`); toast('Course archived'); navigate('courses'); }
  catch(e) { toast(e.message,'error'); }
}
</script>

// ═══════════════════════════════════════════════
//  TEACHER: COURSES
// ═══════════════════════════════════════════════
function buildTeacherCourses() {

    openModal('course-students');

}

// TEACHER: ASSIGNMENTS
function buildTeacherAssignments() {
  const assignments = S.data.assignments || [];
  const courses     = S.data.courses     || [];
  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <div><div class="section-title" style="margin-bottom:0">Assignments</div><div class="text-muted text-sm">Manage assignments for your courses</div></div>
    <button class="btn btn-primary" onclick="openModal('add-assignment')">+ Create Assignment</button>
  </div>
  <div class="card">
    ${assignments.length ? `<div class="tbl-wrap"><table><thead><tr><th>Title</th><th>Course</th><th>Type</th><th>Due Date</th><th>Graded</th><th>Status</th><th>Actions</th></tr></thead><tbody>
      ${assignments.map(a=>{
        const due = new Date(a.due_date);

        return `<tr>
          <td class="fw-600">${a.title}</td>
          <td><span class="badge badge-blue">${a.course_code}</span></td>

          <td><div class="td-actions">
            <button class="btn btn-success btn-sm" onclick="openGradeModal(${a.id},${a.course_id},'${a.title}',${a.total_points})">Grade</button>

async function openGradeModal(assignmentId, courseId, title, maxPoints) {
  try {

}

// TEACHER: GRADES
function buildTeacherGrades() {
  const courses = S.data.courses || [];
  return `
  <div class="section-title">Grade Management</div>
  <div class="card">
    <div class="card-header"><div class="card-title">Select a Course to View Grades</div></div>

      <div class="course-card" onclick="loadCourseGrades(${c.id},'${c.name}')">

}

async function loadCourseGrades(courseId, courseName) {
  try {
    const res = await GET(`/teacher/courses/${courseId}/grades`);

function buildCourseGradeTable() {

      ${grades.map(g=>`<tr>
        <td class="fw-600">${g.student_name}</td>
        <td>${g.roll_number}</td>
        <td>${g.assignment_title||'—'}</td>
        <td>${g.score}/${g.max_score}</td>
        <td>${g.percentage}%</td>
        <td><span class="grade-${g.letter_grade}">${g.letter_grade}</span></td>
        <td class="text-muted text-sm">${g.graded_at?new Date(g.graded_at).toLocaleDateString():'—'}</td>
      </tr>`).join('')}
    </tbody></table></div>` : `<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">No grades yet</div></div>`}

}
</script>

<script>
// ═══════════════════════════════════════════════
//  STUDENT: COURSES (clickable to detail)
// ═══════════════════════════════════════════════
function buildStudentCourses() {
  const courses = S.data.courses || [];
  const colors = ['var(--primary)','var(--purple)','var(--teal)','var(--orange)','var(--green)'];
  if (!courses.length) return `<div class="empty"><div class="empty-icon">📚</div><div class="empty-title">No courses enrolled</div><div class="text-muted">Contact your admin or teacher to get enrolled.</div></div>`;
  return `
  <div class="section-title">My Courses — Click to view details</div>
  <div class="course-grid">
    ${courses.map((c,i)=>`
    <div class="course-card" onclick="navigate('course_detail',{id:${c.id}})" style="border-left-color:${colors[i%colors.length]}">
      <div class="course-card-head">
        <span class="badge badge-blue">${c.code}</span>
        <span class="text-sm text-muted">Sem ${c.semester}</span>
      </div>
      <div class="fw-600" style="margin-bottom:4px">${c.name}</div>
      <div class="text-muted text-sm">👤 ${c.instructor_name||'TBA'} · ${c.credits} credits</div>
      ${c.instructor_email ? `<div class="text-muted text-sm">✉️ ${c.instructor_email}</div>` : ''}
      <div style="margin-top:12px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span class="text-sm text-muted">Progress</span>
          <span class="text-sm fw-600">${c.graded_assignments||0}/${c.total_assignments||0} graded</span>
        </div>
        ${c.total_assignments ? `<div class="progress-bar"><div class="progress-fill" style="width:${Math.round(((c.graded_assignments||0)/(c.total_assignments||1))*100)}%"></div></div>` : ''}
      </div>
      ${c.avg_grade ? `<div style="margin-top:10px;font-size:13px;font-weight:600;color:var(--green)">Avg: ${Math.round(c.avg_grade)}%</div>` : ''}
      <div class="btn btn-outline btn-sm" style="margin-top:12px;display:inline-flex">View Course →</div>
    </div>`).join('')}
  </div>`;
}

// COURSE DETAIL (student clicks on course)
function buildCourseDetail() {
  const c = S.data.course_detail;
  if (!c) return buildLoading();
  const now = new Date();
  const upcoming = (c.assignments||[]).filter(a => new Date(a.due_date) >= now && !a.submitted);
  const past      = (c.assignments||[]).filter(a => new Date(a.due_date) <  now || a.submitted);

  return `
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
    <button class="btn btn-ghost btn-sm" onclick="navigate('courses')">← Back</button>
    <div>
      <span class="badge badge-blue" style="margin-right:8px">${c.code}</span>
      <span class="text-muted text-sm">Semester ${c.semester}</span>
    </div>
  </div>
  <div class="grid-2" style="margin-bottom:20px">
    <div class="card">
      <div class="card-title" style="margin-bottom:16px">${c.name}</div>
      <div class="info-row"><div class="info-label">Instructor</div><div class="info-value">${c.instructor_name||'TBA'}</div></div>
      <div class="info-row"><div class="info-label">Email</div><div class="info-value text-sm">${c.instructor_email||'—'}</div></div>
      <div class="info-row"><div class="info-label">Department</div><div class="info-value">${c.department||'—'}</div></div>
      <div class="info-row"><div class="info-label">Credits</div><div class="info-value">${c.credits}</div></div>
      <div class="info-row"><div class="info-label">Status</div><div class="info-value"><span class="badge badge-green">${c.status}</span></div></div>
      ${c.description ? `<div class="divider"></div><div class="text-muted text-sm">${c.description}</div>` : ''}
    </div>
    <div class="card">
      <div class="card-title" style="margin-bottom:16px">My Performance</div>
      ${(c.grades||[]).length ? `
        <div class="stats-grid" style="grid-template-columns:1fr 1fr;margin-bottom:16px">
          <div class="stat-card" style="padding:14px">
            <div><div class="stat-label">Avg Score</div><div class="stat-val" style="font-size:22px;color:var(--green)">${Math.round((c.grades||[]).reduce((s,g)=>s+g.percentage,0)/((c.grades||[]).length||1))}%</div></div>
          </div>
          <div class="stat-card" style="padding:14px">
            <div><div class="stat-label">Assignments Graded</div><div class="stat-val" style="font-size:22px;color:var(--primary)">${(c.grades||[]).length}</div></div>
          </div>
        </div>
        <div class="tbl-wrap"><table><thead><tr><th>Grade</th><th>Score</th><th>Letter</th></tr></thead><tbody>
          ${(c.grades||[]).map(g=>`<tr><td>${g.graded_at?new Date(g.graded_at).toLocaleDateString():'—'}</td><td>${g.score}/${g.max_score}</td><td><span class="grade-${g.letter_grade}">${g.letter_grade}</span></td></tr>`).join('')}
        </tbody></table></div>` : `<div class="empty" style="padding:20px"><div class="empty-icon">📊</div><div class="empty-title">No grades yet</div></div>`}
    </div>
  </div>
  ${upcoming.length ? `<div class="card">
    <div class="card-header"><div class="card-title">📋 Upcoming Assignments (${upcoming.length})</div></div>
    <div class="tbl-wrap"><table><thead><tr><th>Title</th><th>Type</th><th>Points</th><th>Due Date</th><th>Days Left</th></tr></thead><tbody>
      ${upcoming.map(a=>{
        const days = Math.ceil((new Date(a.due_date) - now) / 86400000);
        return `<tr>
          <td class="fw-600">${a.title}</td>
          <td><span class="badge badge-gray">${a.type}</span></td>
          <td>${a.total_points}</td>
          <td>${new Date(a.due_date).toLocaleDateString()}</td>
          <td><span class="badge badge-${days<=2?'red':days<=7?'yellow':'green'}">${days}d left</span></td>
        </tr>`;
      }).join('')}
    </tbody></table></div>
  </div>` : ''}
  ${past.length ? `<div class="card">
    <div class="card-header"><div class="card-title">✅ Past / Submitted (${past.length})</div></div>
    <div class="tbl-wrap"><table><thead><tr><th>Title</th><th>Type</th><th>Due</th><th>Result</th></tr></thead><tbody>
      ${past.map(a=>`<tr>
        <td class="fw-600">${a.title}</td>
        <td><span class="badge badge-gray">${a.type}</span></td>
        <td class="text-muted text-sm">${new Date(a.due_date).toLocaleDateString()}</td>
        <td>${a.submitted && a.letter_grade ? `<span class="grade-${a.letter_grade}">${a.letter_grade} (${a.score}/${a.total_points})</span>` : a.submitted ? `<span class="badge badge-yellow">Pending grade</span>` : `<span class="badge badge-red">Not submitted</span>`}</td>
      </tr>`).join('')}
    </tbody></table></div>
  </div>` : ''}
  ${(c.classmates||[]).length ? `<div class="card">
    <div class="card-header"><div class="card-title">👥 Classmates (${c.classmates.length}+)</div></div>
    <div style="display:flex;flex-wrap:wrap;gap:10px">
      ${c.classmates.map(s=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg);border-radius:8px">
        <div class="avatar av-sm">${s.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()}</div>
        <div><div class="text-sm fw-600">${s.name}</div><div class="text-sm text-muted">${s.roll_number}</div></div>
      </div>`).join('')}
    </div>
  </div>` : ''}`;
}

// STUDENT: ASSIGNMENTS
function buildStudentAssignments() {
  const all = S.data.assignments || [];
  const now = new Date();
  const upcoming = all.filter(a => new Date(a.due_date) >= now && !a.is_submitted);
  const overdue  = all.filter(a => new Date(a.due_date) <  now && !a.is_submitted);
  const done     = all.filter(a => a.is_submitted);

  function row(a) {
    const due = new Date(a.due_date);
    const days = Math.ceil((due - now) / 86400000);
    return `<tr>
      <td><div class="fw-600">${a.title}</div><div class="text-muted text-sm">${a.type}</div></td>
      <td><span class="badge badge-blue">${a.course_code}</span></td>
      <td>${a.total_points}</td>
      <td>${due.toLocaleDateString()}</td>
      <td>${a.is_submitted ? (a.letter_grade ? `<span class="grade-${a.letter_grade}">${a.letter_grade} (${a.score}/${a.total_points})</span>` : `<span class="badge badge-yellow">Pending</span>`) : due < now ? `<span class="badge badge-red">Overdue</span>` : `<span class="badge badge-${days<=2?'red':days<=7?'yellow':'green'}">${days}d</span>`}</td>
    </tr>`;
  }

  return `
  <div class="section-title">Assignments</div>
  ${upcoming.length ? `<div class="card"><div class="card-header"><div class="card-title">📋 Upcoming (${upcoming.length})</div></div>
  <div class="tbl-wrap"><table><thead><tr><th>Assignment</th><th>Course</th><th>Points</th><th>Due</th><th>Status</th></tr></thead><tbody>${upcoming.map(row).join('')}</tbody></table></div></div>` : ''}
  ${overdue.length ? `<div class="card"><div class="card-header"><div class="card-title" style="color:var(--red)">⚠️ Overdue (${overdue.length})</div></div>
  <div class="tbl-wrap"><table><thead><tr><th>Assignment</th><th>Course</th><th>Points</th><th>Due</th><th>Status</th></tr></thead><tbody>${overdue.map(row).join('')}</tbody></table></div></div>` : ''}
  ${done.length ? `<div class="card"><div class="card-header"><div class="card-title" style="color:var(--green)">✅ Submitted (${done.length})</div></div>
  <div class="tbl-wrap"><table><thead><tr><th>Assignment</th><th>Course</th><th>Points</th><th>Due</th><th>Result</th></tr></thead><tbody>${done.map(row).join('')}</tbody></table></div></div>` : ''}
  ${!all.length ? `<div class="empty"><div class="empty-icon">📝</div><div class="empty-title">No assignments yet</div></div>` : ''}`;
}

// STUDENT: GRADES
function buildStudentGrades() {
  const grades  = S.data.grades   || [];
  const summary = S.data.summary  || [];
  const cgpa    = S.data.cgpa     || '0.00';
  return `
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-icon" style="background:var(--green-l)">🎓</div><div><div class="stat-label">CGPA</div><div class="stat-val" style="color:var(--green)">${cgpa}</div><div class="stat-sub">out of 4.0</div></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:var(--primary-l)">📚</div><div><div class="stat-label">Courses</div><div class="stat-val" style="color:var(--primary)">${summary.length}</div></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:var(--purple-l)">📊</div><div><div class="stat-label">Total Grades</div><div class="stat-val" style="color:var(--purple)">${grades.length}</div></div></div>
  </div>
  ${summary.length ? `<div class="card">
    <div class="card-header"><div class="card-title">Per-Course Summary</div></div>
    <div class="tbl-wrap"><table><thead><tr><th>Course</th><th>Code</th><th>Credits</th><th>Avg %</th><th>Grade</th><th>Grade Points</th></tr></thead><tbody>
      ${summary.map(c=>{
        const pct = c.avg_pct||0;
        const letter = pct>=90?'A':pct>=80?'B':pct>=70?'C':pct>=60?'D':'F';
        const gp = pct>=90?4.0:pct>=80?3.0:pct>=70?2.0:pct>=60?1.0:0.0;
        return `<tr>
          <td class="fw-600">${c.name}</td>
          <td><span class="badge badge-blue">${c.code}</span></td>
          <td>${c.credits}</td>
          <td>${Math.round(pct)}%</td>
          <td><span class="grade-${letter}">${letter}</span></td>
          <td>${gp.toFixed(1)}</td>
        </tr>`;
      }).join('')}
    </tbody></table></div>
  </div>` : ''}
  ${grades.length ? `<div class="card">
    <div class="card-header"><div class="card-title">All Grade Records</div></div>
    <div class="tbl-wrap"><table><thead><tr><th>Assignment</th><th>Course</th><th>Score</th><th>Grade</th><th>Feedback</th><th>Date</th></tr></thead><tbody>
      ${grades.map(g=>`<tr>
        <td class="fw-600">${g.assignment_title||'—'}</td>
        <td>${g.course_name}</td>
        <td>${g.score}/${g.max_score} (${g.percentage}%)</td>
        <td><span class="grade-${g.letter_grade}">${g.letter_grade}</span></td>
        <td class="text-muted text-sm" style="max-width:200px">${g.feedback||'—'}</td>
        <td class="text-muted text-sm">${g.graded_at?new Date(g.graded_at).toLocaleDateString():'—'}</td>
      </tr>`).join('')}
    </tbody></table></div>
  </div>` : `<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">No grades yet</div></div>`}`;
}

// PROFILE
function buildProfile() {
  const u = S.data.profile || S.user;
  const role = u.role;
  const si = u.studentInfo || {}; const ti = u.teacherInfo || {};
  const init = u.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  const roleBg = role==='admin'?'#f97316':role==='teacher'?'#7c3aed':'#2563eb';
  return `
  <div class="section-title">Profile</div>
  <div class="grid-2">
    <div class="card">
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
        <div class="avatar av-lg" style="background:${roleBg}">${init}</div>
        <div><div style="font-size:20px;font-weight:800">${u.name}</div>
          <span class="badge role-${role}" style="margin-top:6px">${role}</span>
        </div>
      </div>
      <div class="info-row"><div class="info-label">Email</div><div class="info-value">${u.email}</div></div>
      <div class="info-row"><div class="info-label">Phone</div><div class="info-value">${u.phone||'—'}</div></div>
      <div class="info-row"><div class="info-label">City</div><div class="info-value">${u.city||'—'}</div></div>
      <div class="info-row"><div class="info-label">Country</div><div class="info-value">${u.country||'—'}</div></div>
      ${role==='student' ? `<div class="divider"></div>
      <div class="info-row"><div class="info-label">Roll Number</div><div class="info-value"><span class="badge badge-blue">${si.roll_number||'—'}</span></div></div>
      <div class="info-row"><div class="info-label">Semester</div><div class="info-value">Semester ${si.semester||1}</div></div>
      <div class="info-row"><div class="info-label">GPA</div><div class="info-value fw-600" style="color:var(--green)">${parseFloat(si.gpa||0).toFixed(2)}</div></div>` : ''}
      ${role==='teacher' ? `<div class="divider"></div>

        <button class="btn btn-warning" onclick="changePassword()">Change Password</button>
      </div>
    </div>
  </div>`;
}

async function saveProfile() {
  const name = document.getElementById('pn')?.value?.trim();
  if (!name) { toast('Name is required','warning'); return; }
  try {
    await PUT('/auth/profile', { name, phone: document.getElementById('pp')?.value, city: document.getElementById('pc')?.value, country: document.getElementById('pco')?.value });
    S.user.name = name; toast('Profile updated','success'); navigate('profile');
  } catch(e) { toast(e.message,'error'); }
}

async function changePassword() {
  const cur = document.getElementById('cp')?.value;
  const nw  = document.getElementById('np')?.value;
  const cnf = document.getElementById('cnp')?.value;
  if (!cur || !nw || !cnf) { toast('Fill all fields','warning'); return; }
  if (nw !== cnf) { toast('Passwords do not match','warning'); return; }
  if (nw.length < 6) { toast('Min. 6 characters','warning'); return; }
  try {
    await PUT('/auth/change-password', { currentPassword: cur, newPassword: nw });
    toast('Password changed!','success');
    ['cp','np','cnp'].forEach(id => { const el = document.getElementById(id); if(el) el.value=''; });
  } catch(e) { toast(e.message,'error'); }
}
</script>

function openModal(type, data, extra) {
  S.modal = { type, data: data||{}, extra };
  renderModal();
}
function closeModal() { S.modal = null; const el = document.getElementById('modal-root'); if(el) el.innerHTML=''; }
function renderModal() {
  const el = document.getElementById('modal-root');
  if (!el) return;
  if (!S.modal) { el.innerHTML=''; return; }
  el.innerHTML = buildModal();
}
function buildModal() {
  if (!S.modal) return '';
  const { type, data, extra } = S.modal;
  let content = '';
  if (type==='add-student') content = buildAddStudentModal();
  else if (type==='edit-student') content = buildEditStudentModal(data);
  else if (type==='enroll-student') content = buildEnrollStudentModal(data);
  else if (type==='add-teacher') content = buildAddTeacherModal();
  else if (type==='edit-teacher') content = buildEditTeacherModal(data);
  else if (type==='assign-course') content = buildAssignCourseModal(data, S.data.courses||[]);
  else if (type==='add-course') content = buildAddCourseModal();
  else if (type==='edit-course') content = buildEditCourseModal(data);
  else if (type==='add-assignment') content = buildAddAssignmentModal();
  else if (type==='edit-assignment') content = buildEditAssignmentModal(data);
  else if (type==='grade-students') content = buildGradeStudentsModal();
  else if (type==='course-students') content = buildCourseStudentsModal();
  else if (type==='register') content = buildRegisterModal();
  else return '';
  return `<div class="overlay" onclick="handleOvClick(event)">${content}</div>`;
}

      <td class="fw-600">${s.name}</td>
      <td>${s.roll_number}</td>
      <td><input type="number" id="sc-${s.student_id}" placeholder="0" min="0" max="${maxPoints}" style="width:80px;padding:6px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:13px" ${s.score!=null?`value="${s.score}"`:''}></td>
      <td><input type="text" id="fb-${s.student_id}" placeholder="Optional feedback..." style="width:160px;padding:6px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:13px"></td>
      <td><button class="btn btn-success btn-sm" onclick="submitGrade(${s.student_id},${maxPoints})">Save</button></td>
    </tr>`).join('')}
  </tbody></table></div>
  <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Close</button></div></div>`;
}
async function submitGrade(studentId, maxPoints) {
  const score = document.getElementById(`sc-${studentId}`)?.value;
  const feedback = document.getElementById(`fb-${studentId}`)?.value;
  if (!score && score !== 0) { toast('Enter a score','warning'); return; }
  if (parseInt(score) > maxPoints) { toast(`Score cannot exceed ${maxPoints}`,'warning'); return; }
  try {
    const res = await POST('/teacher/grade', { student_id: studentId, course_id: modalData.courseId, assignment_id: modalData.assignmentId, score: parseInt(score), max_score: maxPoints, feedback });
    toast(`Saved: ${res.letter_grade} (${res.percentage}%)`, 'success');
  } catch(e) { toast(e.message,'error'); }
}

// COURSE STUDENTS MODAL
function buildCourseStudentsModal() {
  const { courseName, students } = modalData;
  return `<div class="modal modal-lg"><div class="modal-head"><div><div class="modal-title">Students: ${courseName}</div></div><button class="modal-close" onclick="closeModal()">✕</button></div>
  <div class="tbl-wrap"><table><thead><tr><th>Name</th><th>Roll No.</th><th>Semester</th><th>GPA</th><th>Score</th><th>Grade</th></tr></thead><tbody>
    ${(students||[]).map(s=>`<tr>
      <td class="fw-600">${s.name}</td>
      <td>${s.roll_number}</td>
      <td>Sem ${s.semester}</td>
      <td>${parseFloat(s.gpa||0).toFixed(2)}</td>
      <td>${s.score!=null?s.score+'/100':'—'}</td>
      <td>${s.letter_grade?`<span class="grade-${s.letter_grade}">${s.letter_grade}</span>`:'—'}</td>
    </tr>`).join('')}
  </tbody></table></div>
  <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Close</button></div></div>`;
}

// REGISTER MODAL
function buildRegisterModal() {
  return `<div class="modal"><div class="modal-head"><div><div class="modal-title">Create Student Account</div></div><button class="modal-close" onclick="closeModal()">✕</button></div>
  <div id="me"></div>
  <div class="form-row"><div class="form-group"><label>Full Name *</label><input id="r-name" placeholder="Your Name"></div><div class="form-group"><label>Phone</label><input id="r-phone" placeholder="555-0000"></div></div>
  <div class="form-group"><label>Email *</label><input id="r-email" type="email" placeholder="you@student.iets.edu"></div>
  <div class="form-group"><label>Password *</label><input id="r-pass" type="password" placeholder="Min. 6 characters"></div>
  <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="submitRegister()">Register</button></div></div>`;
}
async function submitRegister() {
  const name=document.getElementById('r-name')?.value?.trim(), email=document.getElementById('r-email')?.value?.trim(), pass=document.getElementById('r-pass')?.value, phone=document.getElementById('r-phone')?.value;
  const errEl=document.getElementById('me');
  if (!name||!email||!pass) { errEl.innerHTML=`<div class="err-box">Name, email and password required.</div>`; return; }
  try {
    const res = await POST('/auth/register', { name, email, password: pass, phone });
    S.token = res.token; S.user = res.user;
    localStorage.setItem('ieg_token', res.token);
    await loadPageData('dashboard'); closeModal(); render();
  } catch(e) { errEl.innerHTML=`<div class="err-box">${e.message}</div>`; }
}

// ═══════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════
function toast(msg, type='info') {
  const icons = { success:'✅', error:'❌', warning:'⚠️', info:'ℹ️' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type]||'ℹ️'}</span><span>${msg}</span>`;
  const wrap = document.getElementById('tw');
  if (wrap) {
    wrap.appendChild(el);
    setTimeout(() => { el.style.opacity='0'; el.style.transform='translateX(100%)'; el.style.transition='all .3s'; setTimeout(()=>el.remove(), 300); }, 3500);
  }
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
async function init() {
  if (S.token) {
    try {
      const res = await GET('/auth/me');
      S.user = res.user;
      await loadPageData('dashboard');
    } catch(e) { S.token = null; localStorage.removeItem('ieg_token'); }
  }
  render();
}
init();
</script>
</body>
